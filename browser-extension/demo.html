<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8" />
<title>Wuhla extension — standalone demo (loads the real content.js unmodified)</title>
<link rel="stylesheet" href="content.css" />
<style>
  body { font-family: -apple-system, sans-serif; background: #05101c; color: #E7ECF3; padding: 40px; }
  .page-mock { max-width: 480px; }
  .page-mock h2 { font-size: 20px; }
  .page-mock .price-line { color: #9AB0C4; margin-top: 10px; }
</style>
</head>
<body>
  <div class="page-mock">
    <h2>متجر تجريبي — MacBook Air</h2>
    <p class="price-line">6000 ريال — أو 4 payments — 1500 ريال / شهر</p>
    <button>إتمام الدفع</button>
    <p>صفحة تجريبية (مو جزء من الإضافة) تحاكي صفحة دفع حقيقية بأسلوب Tabby/Tamara،
      وتحمّل content.js/content.css الحقيقيين بدون أي تعديل — عشان نتأكد إن
      الكود اللي بيُشحن فعليًا كإضافة متصفح يشتغل صح.</p>
  </div>
  <script src="chrome-shim.js"></script>
  <script src="content.js"></script>
</body>
</html>
