<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8" />
<title>Wuhla extension — single full-payment checkout demo</title>
<link rel="stylesheet" href="content.css" />
<style>
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #111; padding: 40px; }
  .checkout { max-width: 420px; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .checkout h2 { font-size: 18px; margin: 0 0 4px; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid #eee; font-size: 14px; }
  .total { font-weight: 700; font-size: 18px; }
  .pay-btn { width: 100%; background: #111; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; cursor: pointer; margin-top: 16px; }
</style>
</head>
<body>
  <div class="checkout">
    <h2>إتمام الطلب — سلة المشتريات</h2>
    <div class="row"><span>حذاء رياضي</span><span>399 ريال</span></div>
    <div class="row"><span>شحن</span><span>0 ريال</span></div>
    <div class="row total"><span>الإجمالي</span><span>399 ريال</span></div>
    <button class="pay-btn">إتمام الدفع</button>
  </div>
  <script src="chrome-shim.js"></script>
  <script src="content.js"></script>
</body>
</html>
